<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    
    <link rel="stylesheet" href="/src/main/resources/static/css/Style_prueba.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Figtree:ital,wght@0,300..900;1,300..900&display=swap" rel="stylesheet">
    <title>Login GlicemIA</title>
</head>
<body style="background: linear-gradient(rgb(255, 228, 178), orange);">
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-5 p-5 rounded-5" style="background-color: rgb(255, 255, 255);"> 
                
                <div class="text-center">
                    <img src="/src/main/resources/static/img/GlicemIA_icono.png" alt="Icono de GlicemIA" class="mb-3" style="width: 100px; height: auto;"> 
                </div>

                <h3 id="bienV" class="text-center">Bienvenido a GlicemIA</h3> 
                
                <form method="post" action="#">
                    <h6 id="iniciaS" class="text-center mb-4">Inicia Sesión para continuar</h6>
                    
                    <div class="mb-3 input-group">
                        <span class="input-group-text">
                            <i class="bi bi-person-fill"></i> 
                        </span>
                        <input type="text" id="correo" name="correo" class="form-control" placeholder="Tu correo"/> 
                    </div>
                    
                    <div class="mb-3 input-group">
                        <span class="input-group-text">
                            <i class="bi bi-lock-fill"></i> 
                        </span>
                        <input type="password" id="contrasena" name="contrasena" class="form-control" placeholder="Tu contraseña"/> 
                    </div>
                    
                    <div id="pNaranjo" class="text-end"> <p>¿Olvidaste tu contraseña?</p> </div>
                    
                    <div class="d-grid"> 
                        <button type="submit" id="naranjo" class="btn btn-primary morado">Iniciar Sesión</button> 
                    </div>
                    <div id="noTienesC" class="text-center"><p>¿No tienes una cuenta? <a id="pNaranjo" href="registro.jsp">Registrate</a></p></div>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
